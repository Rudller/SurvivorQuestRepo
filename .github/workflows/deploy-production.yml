name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOMAIN: ${{ secrets.PROD_DOMAIN }}
          LETSENCRYPT_EMAIL: ${{ secrets.PROD_LETSENCRYPT_EMAIL }}
          POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          JOIN_CODE_PEPPER: ${{ secrets.PROD_JOIN_CODE_PEPPER }}
          STATION_QR_SECRET: ${{ secrets.PROD_STATION_QR_SECRET }}
          JOIN_CODE_LEGACY_PEPPER: ${{ secrets.PROD_JOIN_CODE_LEGACY_PEPPER }}
          MOBILE_QR_ENTRY_BASE_URL: ${{ secrets.PROD_MOBILE_QR_ENTRY_BASE_URL }}
          R2_ENDPOINT: ${{ secrets.PROD_R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.PROD_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.PROD_R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.PROD_R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.PROD_R2_PUBLIC_BASE_URL }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          envs: DOMAIN,LETSENCRYPT_EMAIL,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,JOIN_CODE_PEPPER,STATION_QR_SECRET,JOIN_CODE_LEGACY_PEPPER,MOBILE_QR_ENTRY_BASE_URL,R2_ENDPOINT,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET,R2_PUBLIC_BASE_URL
          script_stop: true
          script: |
            set -eu

            cd "${{ secrets.PROD_APP_DIR }}"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            cat > .env.production <<EOF
            DOMAIN=${DOMAIN}
            LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            JOIN_CODE_PEPPER=${JOIN_CODE_PEPPER}
            STATION_QR_SECRET=${STATION_QR_SECRET}
            JOIN_CODE_LEGACY_PEPPER=${JOIN_CODE_LEGACY_PEPPER}
            MOBILE_QR_ENTRY_BASE_URL=${MOBILE_QR_ENTRY_BASE_URL}
            R2_ENDPOINT=${R2_ENDPOINT}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET=${R2_BUCKET}
            R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
            EOF

            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T backend pnpm prisma migrate deploy
