name: survivorquest

services:
  traefik:
    image: traefik:v3.6.6
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --api.dashboard=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./SurvivorQuestRepo
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      CORS_ORIGIN_ALLOWLIST: https://${DOMAIN},https://www.${DOMAIN}
      AUTH_COOKIE_SAME_SITE: none
      AUTH_COOKIE_SECURE: "true"
      JOIN_CODE_PEPPER: ${JOIN_CODE_PEPPER}
      STATION_QR_SECRET: ${STATION_QR_SECRET}
      JOIN_CODE_LEGACY_PEPPER: ${JOIN_CODE_LEGACY_PEPPER:-}
      MOBILE_QR_ENTRY_BASE_URL: ${MOBILE_QR_ENTRY_BASE_URL:-sq://station-entry}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=(Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls=true
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.routers.backend.priority=100
      - traefik.http.routers.backend.middlewares=backend-strip-api@docker
      - traefik.http.middlewares.backend-strip-api.stripprefix.prefixes=/api
      - traefik.http.services.backend.loadbalancer.server.port=3001
    restart: unless-stopped

  admin:
    build:
      context: ./SurvivorQuestRepo
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    environment:
      NODE_ENV: production
      PORT: 3100
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls=true
      - traefik.http.routers.admin.tls.certresolver=letsencrypt
      - traefik.http.routers.admin.priority=10
      - traefik.http.services.admin.loadbalancer.server.port=3100
    restart: unless-stopped

volumes:
  postgres_data:
  traefik_letsencrypt:
