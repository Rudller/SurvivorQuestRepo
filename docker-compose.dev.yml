name: survivorquest-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-survivorquest}
      POSTGRES_USER: ${POSTGRES_USER:-survivorquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-survivorquest}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-survivorquest} -d ${POSTGRES_DB:-survivorquest}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./SurvivorQuestRepo
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-survivorquest}:${POSTGRES_PASSWORD:-survivorquest}@db:5432/${POSTGRES_DB:-survivorquest}?schema=public
      CORS_ALLOW_ALL_DEV_ORIGINS: "true"
      AUTH_COOKIE_SAME_SITE: lax
      AUTH_COOKIE_SECURE: "false"
      JOIN_CODE_PEPPER: ${JOIN_CODE_PEPPER:-dev-join-code-pepper-change-me-123456}
      STATION_QR_SECRET: ${STATION_QR_SECRET:-dev-station-qr-secret-change-me-123456}
      MOBILE_QR_ENTRY_BASE_URL: ${MOBILE_QR_ENTRY_BASE_URL:-sq://station-entry}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_dev_data:
